version: "3.8"

# ════════════════════════════════════════════════════════════
# CLAUDE-BRAIN — Stack 100% Docker
# Todo corre en contenedores, incluyendo el Claude Code CLI
#
# SETUP EN 3 PASOS:
#   1. cp .env.example .env  → editar con tus valores
#   2. docker compose up -d --build
#   3. docker compose exec agent-api claude auth login   (primera vez)
#      O usar CLAUDE_CREDENTIALS_JSON en .env (recomendado)
# ════════════════════════════════════════════════════════════

services:

  # ═══════════════════════════════════════════
  # NGINX — Reverse proxy + SSL
  # ═══════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: cb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on: [agent-api, webui, n8n]
    networks: [internal]
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: cb-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "certonly --webroot -w /var/www/certbot
             -d ${DOMAIN:-localhost} --email ${EMAIL:-admin@localhost}
             --agree-tos --non-interactive --keep-until-expiring"
    profiles: ["ssl"]  # Solo se ejecuta con: docker compose --profile ssl up certbot

  # ═══════════════════════════════════════════
  # AGENT API — Motor Claude dentro de Docker
  #
  # Auth estrategias (ver entrypoint.sh):
  #   A) CLAUDE_CREDENTIALS_JSON en .env  ← recomendado
  #   B) docker compose exec agent-api claude auth login
  #   C) Volumen claude_auth persistente
  # ═══════════════════════════════════════════
  agent-api:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: cb-agent
    environment:
      # ── Auth Claude Code Max (elegir UNA opción) ──────────
      # Opción A: JSON completo de ~/.claude/.credentials.json
      - CLAUDE_CREDENTIALS_JSON=${CLAUDE_CREDENTIALS_JSON:-}
      # Opción B: dejar vacío + ejecutar: docker compose exec agent-api claude auth login

      # ⚠️  NO poner ANTHROPIC_API_KEY → fuerza Max OAuth ($0 extra)
      # - ANTHROPIC_API_KEY=   ← COMENTADO INTENCIONALMENTE

      # ── Integraciones ─────────────────────────────────────
      - SUPABASE_URL=http://supabase-kong:8000
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - EMBEDDING_URL=http://embeddings:8080
      - SANDBOX_URL=http://sandbox-api:8080

      # ── Config del agente ──────────────────────────────────
      - AGENT_MAX_TURNS=${AGENT_MAX_TURNS:-25}
      - JUPYTER_URL=http://jupyter:8888
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-claude-brain-jupyter-token}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-300}
      - AGENT_MAX_SUBAGENTS=${AGENT_MAX_SUBAGENTS:-4}
    volumes:
      # Credenciales OAuth persistentes (sobreviven reinicios)
      - claude_auth:/root/.claude
      # Workspaces de proyectos del agente
      - agent_workspaces:/workspaces
      # Skills montadas como read-only
      - ./skills:/app/skills:ro
      # Docker socket para sandbox (spawning de contenedores)
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"     # Acceso directo para desarrollo
    depends_on:
      redis:
        condition: service_healthy
      supabase-db:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    networks: [internal, sandbox-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # ═══════════════════════════════════════════
  # WEB UI — LibreChat (interfaz de chat)
  # ═══════════════════════════════════════════
  webui:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: cb-webui
    environment:
      - MONGO_URI=mongodb://mongodb:27017/librechat
      # LibreChat usa su propia API key para su UI (no el agente)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY_LIBRECHAT:-}
      - AGENT_API_URL=http://agent-api:8000
    volumes:
      - ./config/librechat/librechat.yaml:/app/librechat.yaml:ro
      - librechat_uploads:/app/client/public/images
    ports:
      - "3080:3080"     # Web UI
    depends_on: [mongodb]
    networks: [internal]
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: cb-mongodb
    volumes: [mongodb_data:/data/db]
    networks: [internal]
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # SANDBOX — Ejecución aislada de código
  # Python: snekbox (nsjail)
  # JS/Bash: Docker con restricciones
  # ═══════════════════════════════════════════
  snekbox:
    image: ghcr.io/python-discord/snekbox:latest
    container_name: cb-snekbox
    ipc: none
    privileged: true
    networks: [sandbox-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  sandbox-api:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: cb-sandbox
    environment:
      - SNEKBOX_URL=http://snekbox:8060
    networks: [internal, sandbox-net]
    depends_on: [snekbox]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ═══════════════════════════════════════════
  # REDIS — Working memory (conversaciones)
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: cb-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes: [redis_data:/data]
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # SUPABASE — PostgreSQL + pgvector
  # Long-term memory + datos de la app
  # ═══════════════════════════════════════════
  supabase-db:
    image: supabase/postgres:15.6.1.143
    container_name: cb-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - supabase_db:/var/lib/postgresql/data
      - ./config/supabase/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
      - ./config/supabase/02-memories.sql:/docker-entrypoint-initdb.d/02-memories.sql
      - ./config/supabase/04-watcher.sql:/docker-entrypoint-initdb.d/04-watcher.sql
    ports:
      - "5432:5432"     # Acceso directo a PostgreSQL
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  supabase-kong:
    image: kong:2.8.1
    container_name: cb-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./config/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  supabase-auth:
    image: supabase/gotrue:v2.158.1
    container_name: cb-gotrue
    environment:
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3080}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
    depends_on:
      supabase-db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: cb-postgrest
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_SCHEMAS: public,storage,extensions
      PGRST_DB_ANON_ROLE: anon
    depends_on:
      supabase-db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  supabase-studio:
    image: supabase/studio:20241028-a265374
    container_name: cb-studio
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_KEY: ${SUPABASE_SERVICE_KEY}
    ports:
      - "8001:3000"     # Supabase Studio UI
    depends_on: [supabase-kong]
    networks: [internal]
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # N8N — Automatización de workflows
  # ═══════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: cb-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=http://n8n:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase-db
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes: [n8n_data:/home/node/.n8n]
    ports:
      - "5678:5678"     # n8n UI
    depends_on:
      supabase-db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # TELEGRAM BOT — La terminal del agente
  # Recibe mensajes → Agent API → responde
  # ═══════════════════════════════════════════
  telegram-bot:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    container_name: cb-telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Tu user_id de Telegram (seguridad — solo tú puedes usarlo)
      # Obtener con @userinfobot en Telegram
      - TELEGRAM_ALLOWED_IDS=${TELEGRAM_ALLOWED_IDS}
      - AGENT_API_URL=http://agent-api:8000
    depends_on: [agent-api]
    networks: [internal]
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # JUPYTER — Kernel Python científico
  # Un kernel por sesión, estado persistente
  # ═══════════════════════════════════════════
  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    container_name: cb-jupyter
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-claude-brain-jupyter-token}
    volumes:
      # Workspace compartido con el agente
      - workspaces:/workspaces
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api?token=claude-brain-jupyter-token"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════
  # EMBEDDINGS — nomic-embed-text LOCAL ($0/mes)
  # HuggingFace Text Embeddings Inference
  # 768 dims, 8192 ctx, ~270MB download inicial
  # ═══════════════════════════════════════════
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: cb-embeddings
    command: --model-id nomic-ai/nomic-embed-text-v1.5 --port 8080
    volumes: [embeddings_cache:/data]
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s   # Dar tiempo para descargar el modelo (~270MB)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

# ═══════════════════════════════════════════
# REDES
# ═══════════════════════════════════════════
networks:
  internal:
    driver: bridge
    name: cb-internal
  sandbox-net:
    driver: bridge
    name: cb-sandbox
    internal: true   # Sandbox sin acceso a internet

# ═══════════════════════════════════════════
# VOLÚMENES
# ═══════════════════════════════════════════
volumes:
  # ⭐ claude_auth — credenciales OAuth del Max plan
  #    Persisten entre reinicios del contenedor
  #    Se pobla con CLAUDE_CREDENTIALS_JSON o claude auth login
  claude_auth:
    name: cb-claude-auth

  agent_workspaces:
    name: cb-workspaces
  redis_data:
    name: cb-redis
  supabase_db:
    name: cb-postgres
  mongodb_data:
    name: cb-mongodb
  n8n_data:
    name: cb-n8n
  embeddings_cache:
    name: cb-embeddings
  certbot_certs:
    name: cb-certs
  certbot_www:
    name: cb-certbot-www
  librechat_uploads:
    name: cb-uploads
